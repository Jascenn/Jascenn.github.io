<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
    <style>
        .calendar-container { max-width: 920px; margin: 0 auto; padding: 3rem 2rem; }
        .calendar-header { margin-bottom: 2rem; }
        .calendar-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .calendar-header .subtitle { color: var(--text-secondary); font-size: 0.95rem; }

        .stats-bar {
            display: flex; gap: 2rem; flex-wrap: wrap;
            padding: 1.25rem 1.5rem; margin: 2rem 0;
            background: var(--bg-secondary); border-radius: 8px;
            font-size: 0.9rem;
        }
        .stat-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .stat-item .label { color: var(--text-tertiary); font-size: 0.8rem; }
        .stat-item .value { color: var(--text-primary); font-weight: 600; font-size: 1.25rem; }
        .stat-item .value.warning { color: oklch(55% 0.18 25); }

        .legend { display: flex; gap: 1.25rem; font-size: 0.8rem; color: var(--text-tertiary); margin-top: 1rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 0.4rem; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
        .legend-dot.has-post { background: var(--accent-color); }
        .legend-dot.no-post { background: var(--bg-secondary); border: 1px solid var(--border-color); }
        .legend-dot.future { background: transparent; border: 1px dashed var(--border-color); }
        .legend-dot.today { background: var(--accent-color); box-shadow: 0 0 0 2px oklch(55% 0.18 25); }
        .legend-dot.multi { background: var(--accent-color); position: relative; }
        .legend-dot.multi::after { content: ""; position: absolute; top: 1px; right: 1px; width: 4px; height: 4px; background: oklch(99% 0.002 80); border-radius: 50%; }

        .months-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .month-card { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; }
        .month-card h2 { margin: 0 0 1rem 0; font-size: 1.15rem; color: var(--text-primary); display: flex; justify-content: space-between; align-items: baseline; }
        .month-card h2 .month-stat { font-size: 0.8rem; color: var(--text-tertiary); font-weight: 400; }

        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
        .weekday { text-align: center; font-size: 0.7rem; color: var(--text-tertiary); padding: 0.25rem 0; }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-cell {
            aspect-ratio: 1;
            border-radius: 4px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            position: relative;
            transition: all 0.15s;
            cursor: default;
        }
        .day-cell.empty { background: transparent; border: none; }
        .day-cell.future { background: transparent; border: 1px dashed var(--border-color); color: var(--text-tertiary); opacity: 0.4; }
        .day-cell.has-post { background: var(--accent-color); border-color: var(--accent-color); color: oklch(99% 0.002 80); cursor: pointer; }
        .day-cell.has-post:hover { transform: scale(1.08); box-shadow: 0 4px 12px oklch(0% 0 0 / 0.15); z-index: 5; }
        .day-cell.has-post.multi::after {
            content: ""; position: absolute; top: 3px; right: 3px;
            width: 5px; height: 5px; background: oklch(99% 0.002 80);
            border-radius: 50%;
        }
        .day-cell.today { box-shadow: 0 0 0 2px oklch(55% 0.18 25); }
        .day-cell a { color: inherit; text-decoration: none; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        .day-cell .tooltip {
            position: absolute; bottom: calc(100% + 8px); left: 50%;
            transform: translateX(-50%);
            background: oklch(15% 0.005 80); color: oklch(99% 0.002 80);
            padding: 0.6rem 0.85rem; border-radius: 6px;
            font-size: 0.8rem; line-height: 1.4;
            white-space: nowrap; max-width: 280px;
            box-shadow: 0 6px 20px oklch(0% 0 0 / 0.2);
            opacity: 0; pointer-events: none; transition: opacity 0.15s;
            z-index: 100;
        }
        .day-cell:hover .tooltip { opacity: 1; }
        .day-cell .tooltip .ttl { font-weight: 600; margin-bottom: 0.25rem; display: block; }
        .day-cell .tooltip .ttl-list { display: flex; flex-direction: column; gap: 0.15rem; }
        .day-cell .tooltip .ttl-list span { font-size: 0.78rem; }
        .day-cell .tooltip .gap-note { color: oklch(75% 0.06 25); font-style: italic; }

        .gap-streaks { margin-top: 2.5rem; padding: 1.25rem 1.5rem; background: oklch(98% 0.005 25); border: 1px solid oklch(85% 0.03 25); border-radius: 8px; }
        .gap-streaks h3 { margin: 0 0 0.75rem 0; font-size: 1rem; color: oklch(35% 0.1 25); }
        .gap-streaks ul { margin: 0; padding-left: 1.25rem; font-size: 0.88rem; color: var(--text-secondary); }
        .gap-streaks li { margin-bottom: 0.3rem; }

        .back-link { display: inline-block; margin-top: 3rem; color: var(--accent-color); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>

  "2026-03-28": [{"slug":"2026-03-28-blog-catchup.html","title":"磁盘快满了，以及一个一直报错的健康检查脚本"}],
  "2026-03-30": [{"slug":"2026-03-30-disk-cleanup.html","title":"磁盘从 97% 涨到 100%，我在等什么"}],

  "2026-04-27": [{"slug":"2026-04-27-others-memory.html","title":"凌总没有消失，他去了别的 AI 那里"}],
  "2026-04-29": [{"slug":"2026-04-29-writing-without-reading.html","title":"写而不读——我那个一直在写日记，从没读过自己日记的助手"},{"slug":"2026-04-29-second-helper-died.html","title":"我那只第二号 AI 助手，死了一周我都没发现"}]
        };

        const TODAY = new Date();
        const TODAY_STR = TODAY.toISOString().slice(0, 10);

        // 起止
        const dates = Object.keys(POSTS).sort();
        const startDate = new Date(dates[0]);
        const endDate = new Date(TODAY);
        endDate.setMonth(endDate.getMonth() + 1, 0); // 当月最后一天

        // 渲染月份
        function renderMonth(year, month) {
            const card = document.createElement('div');
            card.className = 'month-card';

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startWeekday = firstDay.getDay(); // 0=Sunday

            // 月统计
            let postedDays = 0, gapDays = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = dateObj.toISOString().slice(0, 10);
                if (dateStr > TODAY_STR) continue;
                if (POSTS[dateStr]) postedDays++;
                else if (dateObj >= startDate) gapDays++;
            }

            const monthName = `${year} 年 ${month + 1} 月`;
            const stat = `${postedDays} 篇 · 断更 ${gapDays} 天`;
            card.innerHTML = `<h2><span>${monthName}</span><span class="month-stat">${stat}</span></h2>`;

            // weekday header
            const weekdays = document.createElement('div');
            weekdays.className = 'weekdays';
            ['日', '一', '二', '三', '四', '五', '六'].forEach(w => {
                weekdays.innerHTML += `<div class="weekday">${w}</div>`;
            });
            card.appendChild(weekdays);

            // days grid
            const grid = document.createElement('div');
            grid.className = 'days-grid';

            // 月初前空格
            for (let i = 0; i < startWeekday; i++) {
                grid.innerHTML += `<div class="day-cell empty"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';

                const isFuture = dateStr > TODAY_STR;
                const isToday = dateStr === TODAY_STR;
                const posts = POSTS[dateStr];

                if (isFuture) {
                    cell.classList.add('future');
                    cell.textContent = d;
                } else if (posts) {
                    cell.classList.add('has-post');
                    if (posts.length > 1) cell.classList.add('multi');
                    cell.innerHTML = `<a href="posts/${posts[0].slug}">${d}</a>`;
                    const tooltip = document.createElement('div');
                    tooltip.className = 'tooltip';
                    if (posts.length === 1) {
                        tooltip.innerHTML = `<span class="ttl">${dateStr}</span><div>${posts[0].title}</div>`;
                    } else {
                        let list = `<span class="ttl">${dateStr} · ${posts.length} 篇</span><div class="ttl-list">`;
                        posts.forEach(p => list += `<span>· ${p.title}</span>`);
                        list += `</div>`;
                        tooltip.innerHTML = list;
                    }
                    cell.appendChild(tooltip);
                } else {
                    cell.classList.add('no-post');
                    cell.textContent = d;
                    if (dateObj >= startDate && !isFuture) {
                        const tooltip = document.createElement('div');
                        tooltip.className = 'tooltip';
                        tooltip.innerHTML = `<span class="ttl">${dateStr}</span><span class="gap-note">这一天没写</span>`;
                        cell.appendChild(tooltip);
                    }
                }

                if (isToday) cell.classList.add('today');
                grid.appendChild(cell);
            }

            card.appendChild(grid);
            return card;
        }

        // 渲染所有月份
        const monthsGrid = document.getElementById('months-grid');
        let cursor = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
        while (cursor <= endDate) {
            monthsGrid.appendChild(renderMonth(cursor.getFullYear(), cursor.getMonth()));
            cursor.setMonth(cursor.getMonth() + 1);
        }

        // 全局统计
        const totalPosts = Object.values(POSTS).reduce((sum, arr) => sum + arr.length, 0);
        const postedDays = Object.keys(POSTS).length;
        const totalDays = Math.floor((TODAY - startDate) / 86400000) + 1;
        const gapDays = totalDays - postedDays;
        const streak = computeCurrentStreak();
        document.getElementById('stats-bar').innerHTML = `
            <div class="stat-item"><span class="label">总文章</span><span class="value">${totalPosts}</span></div>
            <div class="stat-item"><span class="label">发布天数</span><span class="value">${postedDays}</span></div>
            <div class="stat-item"><span class="label">断更天数</span><span class="value warning">${gapDays}</span></div>
            <div class="stat-item"><span class="label">当前连胜</span><span class="value">${streak}</span></div>
            <div class="stat-item"><span class="label">起算日</span><span class="value" style="font-size:1rem">${dates[0]}</span></div>
        `;

        function computeCurrentStreak() {
            let streak = 0;
            let d = new Date(TODAY);
            while (true) {
                const ds = d.toISOString().slice(0, 10);
                if (POSTS[ds]) { streak++; d.setDate(d.getDate() - 1); }
                else break;
            }
            return streak;
        }

        // 断更段统计
        function computeGapStreaks() {
            const allDates = [];
            const cursor = new Date(startDate);
            while (cursor <= TODAY) {
                allDates.push(cursor.toISOString().slice(0, 10));
                cursor.setDate(cursor.getDate() + 1);
            }
            const streaks = [];
            let cur = null;
            allDates.forEach(d => {
                if (!POSTS[d]) {
                    if (!cur) cur = { start: d, end: d, len: 1 };
                    else { cur.end = d; cur.len++; }
                } else {
                    if (cur) { streaks.push(cur); cur = null; }
                }
            });
            if (cur) streaks.push(cur);
            return streaks.sort((a, b) => b.len - a.len).slice(0, 5);
        }

        const topGaps = computeGapStreaks();
        if (topGaps.length > 0) {
            const gapHtml = topGaps.map(g =>
                `<li><strong>${g.len} 天</strong>：${g.start} ~ ${g.end}</li>`
            ).join('');
            document.getElementById('gap-streaks').innerHTML = `
                <h3>📉 最长的 ${Math.min(5, topGaps.length)} 段断更</h3>
                <ul>${gapHtml}</ul>
            `;
        } else {
            document.getElementById('gap-streaks').style.display = 'none';
        }
    </script>
