<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw - 下一代 AI 助手基础设施</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: -apple-system, 'PingFang SC', sans-serif; }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 15px; font-weight: 600; background: linear-gradient(135deg,#7c6fff,#4fc3f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-count { font-size: 13px; color: rgba(255,255,255,0.4); }

  .slides {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 16px 80px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .slide-item {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .slide-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 60px rgba(124,111,255,0.15);
  }
  .slide-item img {
    width: 100%; display: block;
  }
  .slide-num {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .back-btn {
    position: fixed; bottom: 24px; right: 24px;
    background: rgba(124,111,255,0.9);
    backdrop-filter: blur(10px);
    color: #fff; border: none; cursor: pointer;
    width: 44px; height: 44px; border-radius: 50%;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(124,111,255,0.4);
    text-decoration: none;
    opacity: 0; transition: opacity 0.3s;
  }
  .back-btn.visible { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">OpenClaw · 介绍 PPT</span>
  <span class="header-count">共 16 页</span>
</div>

<div class="slides" id="slides"></div>

<a class="back-btn" id="topBtn" href="#" title="回到顶部">↑</a>

<script>
const total = 16;
const container = document.getElementById('slides');

for (let i = 1; i <= total; i++) {
  const num = String(i).padStart(2, '0');
  const div = document.createElement('div');
  div.className = 'slide-item';
  div.innerHTML = `
    <img src="style-final-slide-${num}.png?v=2" alt="第 ${i} 页" loading="${i <= 3 ? 'eager' : 'lazy'}">
    <span class="slide-num">${i} / ${total}</span>
  `;
  container.appendChild(div);
}

// 回到顶部按钮
const topBtn = document.getElementById('topBtn');
window.addEventListener('scroll', () => {
  topBtn.classList.toggle('visible', window.scrollY > 400);
});
</script>
</body>
</html>
