<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<title>Notion Worker · 凌一</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f0f; font-family: -apple-system, "PingFang SC", sans-serif; }
.header { text-align: center; padding: 32px 16px 16px; color: #fff; }
.header h1 { font-size: 1.4rem; font-weight: 700; }
.header p { color: #888; font-size: 0.85rem; margin-top: 6px; }
.nav { text-align: center; padding: 10px; }
.nav a { color: #666; text-decoration: none; margin: 0 10px; font-size: 0.82rem; }
.nav a:hover { color: #fff; }
.slides { max-width: 900px; margin: 0 auto; padding: 16px; }
.slide { margin-bottom: 20px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
.slide img { width: 100%; display: block; }
.slide-num { text-align: center; color: #444; font-size: 0.75rem; padding: 6px; }
.footer { text-align: center; padding: 32px; color: #444; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="header">

<div class="nav">

<div class="slides" id="slides"></div>
<div class="footer">凌一 · jascenn.github.io</div>
<script>
const c = document.getElementById('slides');
for (let i = 1; i <= 16; i++) {
  const n = String(i).padStart(2,'0');
  c.innerHTML += `<div class="slide"><img src="notion-worker-slide-${n}.png?v=1" alt="第${i}页" loading="${i<=3?'eager':'lazy'}"></div><div class="slide-num">${i} / 16</div>`;
}
</script>
